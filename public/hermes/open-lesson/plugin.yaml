name: openlesson
version: 2.0.0
description: openLesson tutoring platform — create learning plans, run multimodal sessions, ask the teaching assistant, verify cryptographic proofs
author: openLesson
homepage: https://www.openlesson.academy
provides_tools:
  - openlesson_create_plan
  - openlesson_adapt_plan
  - openlesson_plan_from_video
  - openlesson_start_session
  - openlesson_analyze
  - openlesson_pause_session
  - openlesson_resume_session
  - openlesson_end_session
  - openlesson_ask
  - openlesson_analytics
provides_hooks:
  - pre_llm_call
requires_env:
  - name: OPENLESSON_API_KEY
    description: "API key for the openLesson tutoring platform"
    url: "https://www.openlesson.academy/dashboard"
    secret: true
